<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Admin - Heart Code</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:#06101d;color:#e9f6ff;font-family:Arial,sans-serif;display:grid;place-items:center;padding:22px}
.panel{width:min(860px,100%);background:rgba(7,20,36,.9);border:1px solid rgba(129,205,255,.22);border-radius:12px;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.38)}
h1{font-size:22px;margin:0 0 10px}p{color:#a9c8df;line-height:1.5;margin:8px 0 16px}
label{display:block;margin:14px 0 7px;color:#cdeaff;font-size:13px}
input,button{font:inherit}input[type=text]{width:100%;border:1px solid rgba(130,205,255,.28);border-radius:8px;background:#081827;color:#fff;padding:11px 12px;outline:none}
input[type=text]:focus{border-color:rgba(145,220,255,.72)}
input[type=file]{width:100%;border:1px dashed rgba(130,205,255,.34);border-radius:8px;background:#081827;color:#dff5ff;padding:11px 12px}
.editor{display:grid;grid-template-columns:minmax(280px,440px) 1fr;gap:18px;align-items:start;margin-top:12px}
.crop-wrap{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#030912;border:1px solid rgba(130,205,255,.22);touch-action:none;cursor:grab}
.crop-wrap:active{cursor:grabbing}.crop-wrap canvas{width:100%;height:100%;display:block}
.controls{display:grid;gap:12px}.row{display:grid;grid-template-columns:84px 1fr;gap:10px;align-items:center;color:#cdeaff;font-size:13px}
input[type=range]{width:100%;accent-color:#4aa3ff}.preview{display:grid;grid-template-columns:116px 1fr;gap:12px;align-items:center}
.heart{width:116px;aspect-ratio:1;background:#102237;clip-path:path("M 58 101 C 19 66 0 45 8 22 C 16 1 41 4 58 25 C 75 4 100 1 108 22 C 116 45 97 66 58 101 Z");overflow:hidden}
.heart img{width:100%;height:100%;object-fit:cover}.status{min-height:22px;color:#9edcff;font-size:13px}.ok{color:#9ff5bd}.err{color:#ff9f9f}
.actions{display:flex;gap:10px;align-items:center;margin-top:18px;flex-wrap:wrap}
button{border:0;border-radius:8px;background:#4aa3ff;color:#00182a;font-weight:700;padding:11px 14px;cursor:pointer}
button.secondary{background:rgba(145,205,255,.12);color:#dff5ff;border:1px solid rgba(145,205,255,.2)}
button:disabled{opacity:.5;cursor:wait}
@media(max-width:720px){body{padding:12px}.panel{padding:16px}.editor{grid-template-columns:1fr}.preview{grid-template-columns:90px 1fr}.heart{width:90px}h1{font-size:19px}.row{grid-template-columns:72px 1fr}}
</style>
</head>
<body>
<main class="panel">
  <h1>Admin Heart Code</h1>
  <p>Đổi tên bản quyền hoặc ảnh trái tim tại đây. Chọn ảnh, kéo để căn khung, chỉnh zoom rồi bấm lưu là trang chính dùng ngay trên trình duyệt này, không cần token.</p>

  <label for="copyright">Tên bản quyền</label>
  <input id="copyright" type="text" placeholder="Ví dụ: Lê Thanh Tùng: Trái Tim Mã Nguồn">

  <label for="image">Ảnh thay vào trái tim</label>
  <input id="image" type="file" accept="image/*">

  <section class="editor">
    <div class="crop-wrap" id="cropWrap" aria-label="Khu vực cắt ảnh">
      <canvas id="cropCanvas" width="900" height="900"></canvas>
    </div>
    <div class="controls">
      <div class="row">
        <span>Zoom</span>
        <input id="zoom" type="range" min="1" max="3" step="0.01" value="1">
      </div>
      <div class="preview">
        <div class="heart"><img id="preview" alt=""></div>
        <div>
          <div class="status" id="status">Sẵn sàng.</div>
          <p>Ảnh khi lưu sẽ được cắt vuông 1200 x 1200 để hiển thị đẹp trong trái tim.</p>
        </div>
      </div>
    </div>
  </section>

  <div class="actions">
    <button id="save">Lưu thay đổi</button>
    <button class="secondary" id="load" type="button">Tải lại cấu hình</button>
    <button class="secondary" id="reset" type="button">Về mặc định</button>
    <button class="secondary" id="openSite" type="button">Mở trang chính</button>
  </div>
</main>

<script>
const $=id=>document.getElementById(id);
const STORAGE_KEY='heartCodeConfig';
const DEFAULT_CONFIG={image:'img1.jpg',copyright:'Lê Thanh Tùng: Trái Tim Mã Nguồn',updatedAt:'default'};
const status=$('status'),fileInput=$('image'),preview=$('preview'),zoom=$('zoom'),canvas=$('cropCanvas'),ctx=canvas.getContext('2d'),wrap=$('cropWrap');
let config={...DEFAULT_CONFIG},img=null,imgReady=false,scale=1,offsetX=0,offsetY=0,drag=null,previewUrl='';

function setStatus(text,type=''){status.className='status '+type;status.textContent=text;}
function readSaved(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||null;}catch{return null;}
}
function setPreview(src){
  if(previewUrl)URL.revokeObjectURL(previewUrl);
  preview.src=src||DEFAULT_CONFIG.image;
}
function baseScale(){
  if(!imgReady)return 1;
  return Math.max(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight);
}
function clampOffsets(){
  if(!imgReady)return;
  const s=baseScale()*scale,w=img.naturalWidth*s,h=img.naturalHeight*s;
  const maxX=Math.max(0,(w-canvas.width)/2),maxY=Math.max(0,(h-canvas.height)/2);
  offsetX=Math.max(-maxX,Math.min(maxX,offsetX));
  offsetY=Math.max(-maxY,Math.min(maxY,offsetY));
}
function drawCrop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#071525';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(imgReady){
    clampOffsets();
    const s=baseScale()*scale,w=img.naturalWidth*s,h=img.naturalHeight*s;
    ctx.drawImage(img,(canvas.width-w)/2+offsetX,(canvas.height-h)/2+offsetY,w,h);
  }else{
    ctx.fillStyle='rgba(205,234,255,.72)';
    ctx.font='22px Arial';
    ctx.textAlign='center';
    ctx.fillText('Chọn ảnh để cắt',canvas.width/2,canvas.height/2);
  }
  ctx.strokeStyle='rgba(255,255,255,.46)';
  ctx.lineWidth=4;
  ctx.strokeRect(2,2,canvas.width-4,canvas.height-4);
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const next=new Image();
    next.onload=()=>resolve(next);
    next.onerror=reject;
    next.src=src;
  });
}
async function useImage(src){
  img=await loadImage(src);
  imgReady=true;scale=1;offsetX=0;offsetY=0;zoom.value='1';
  drawCrop();setPreview(exportImage());
}
function exportImage(){
  const out=document.createElement('canvas');
  out.width=1200;out.height=1200;
  const outCtx=out.getContext('2d');
  outCtx.drawImage(canvas,0,0,out.width,out.height);
  return out.toDataURL('image/jpeg',0.9);
}
function loadConfig(){
  config={...DEFAULT_CONFIG,...(readSaved()||{})};
  $('copyright').value=config.copyright||DEFAULT_CONFIG.copyright;
  setPreview(config.image||DEFAULT_CONFIG.image);
  drawCrop();
  setStatus('Đã tải cấu hình hiện tại.','ok');
}
fileInput.addEventListener('change',async()=>{
  const file=fileInput.files[0];
  if(!file)return;
  try{
    previewUrl=URL.createObjectURL(file);
    await useImage(previewUrl);
    setStatus('Ảnh đã sẵn sàng, có thể kéo và zoom để cắt.','ok');
  }catch{
    setStatus('Không đọc được ảnh này.','err');
  }
});
zoom.addEventListener('input',()=>{scale=Number(zoom.value)||1;drawCrop();if(imgReady)setPreview(exportImage());});
wrap.addEventListener('pointerdown',event=>{
  wrap.setPointerCapture(event.pointerId);
  drag={x:event.clientX,y:event.clientY,offsetX,offsetY};
});
wrap.addEventListener('pointermove',event=>{
  if(!drag)return;
  const rect=wrap.getBoundingClientRect();
  const ratio=canvas.width/rect.width;
  offsetX=drag.offsetX+(event.clientX-drag.x)*ratio;
  offsetY=drag.offsetY+(event.clientY-drag.y)*ratio;
  drawCrop();if(imgReady)setPreview(exportImage());
});
wrap.addEventListener('pointerup',()=>{drag=null;});
wrap.addEventListener('pointercancel',()=>{drag=null;});
$('save').addEventListener('click',async()=>{
  const btn=$('save');
  btn.disabled=true;
  const copyright=$('copyright').value.trim()||DEFAULT_CONFIG.copyright;
  const image=imgReady?exportImage():(config.image||DEFAULT_CONFIG.image);
  const previousImage=config.image||DEFAULT_CONFIG.image;
  const localConfig={image,copyright,updatedAt:new Date().toISOString()};
  try{
    setStatus('Đang lưu...');
    const response=await fetch('/api/save',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({copyright,image:imgReady?image:null,currentImage:previousImage})
    });
    const result=await response.json().catch(()=>({}));
    if(!response.ok)throw new Error(result.error||'API chưa sẵn sàng.');
    config={...localConfig,...(result.config||{})};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(config));
    setPreview(imgReady?image:(config.image||image));
    setStatus('Đã lưu lên GitHub. Đợi Vercel deploy xong rồi refresh trang chính.','ok');
  }catch(error){
    config=localConfig;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(config));
    setPreview(image);
    setStatus('Chỉ lưu tạm trên máy này. Để mọi người thấy, cần cấu hình GITHUB_TOKEN trên server.','err');
  }finally{
    btn.disabled=false;
  }
});
$('load').addEventListener('click',loadConfig);
$('reset').addEventListener('click',()=>{
  localStorage.removeItem(STORAGE_KEY);
  imgReady=false;img=null;scale=1;offsetX=0;offsetY=0;zoom.value='1';
  loadConfig();
  setStatus('Đã đưa về cấu hình mặc định.','ok');
});
$('openSite').addEventListener('click',()=>{location.href='index.html';});
loadConfig();
</script>
</body>
</html>
